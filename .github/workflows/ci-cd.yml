name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Build Next.js app
        run: npm run build

      - name: Build Docker image
        run: docker build -t gcr.io/your-gcp-project-id/crossfit-felix-redesign:latest .

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Build and push Docker image
        run: |-
          docker build -t gcr.io/your-gcp-project-id/crossfit-felix-redesign:latest .
          docker push gcr.io/your-gcp-project-id/crossfit-felix-redesign:latest

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy crossfit-felix-redesign \
            --image gcr.io/your-gcp-project-id/crossfit-felix-redesign:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright smoke tests
        run: npx playwright test
        env:
          BASE_URL: https://crossfit-felix-redesign-your-cloud-run-url.a.run.app
